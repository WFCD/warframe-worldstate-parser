name: Actions
on:
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Install Dependencies
        run: npm ci
      - name: Run linters
        run: npm run lint
      - name: Run commitlint
        run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        node-version: [22, 24, 'lts/*']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Sleep before WG Setup
        if: secrets.WG_CONFIG != null && matrix.node-version != '22'
        run: echo "Sleeping for 1m to allow previous cleanup" && sleep 60
        shell: bash
      - uses: wenoa/setup-wireguard@bb0ff3acfe6d7dea61f754e5eed504ebd58f5064 # v1.0.0
        # let this try to run even if the secret is not set, as it will just skip the setup and the tests will run without it
        if: secrets.WG_CONFIG != null
        with:
          WG_CONFIG: ${{ secrets.WG_CONFIG }}
      - name: Run Tests
        run: npm test
        if: matrix.node-version != '22'
        env:
          CI: true
          parallel: true
      - name: Run Tests (Node 22)
        if: matrix.node-version == '22'
        run: npm run test:coverage
        env:
          CI: true
      - name: Coveralls
        if: matrix.node-version == '22'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - name: Build
        run: npm run build:docs
